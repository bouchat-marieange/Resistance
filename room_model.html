<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résistance</title>
    <script>
        // Mettre à jour le titre dès que possible
        (function() {
            var p = new URLSearchParams(window.location.search);
            var t = p.get('title');
            if (t) document.title = 'Résistance - ' + t;
        })();
    </script>

    <!-- Tailwind CSS + DaisyUI (requis par l'éditeur si chargé) -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            user-select: none;
            touch-action: none;
        }
        canvas { display: block; outline: none; }

        /* ========== LOADING SCREEN ========== */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #loading-screen.fade-out { opacity: 0; pointer-events: none; }
        .loading-title { color: #39ff14; font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
        .loading-subtitle { color: #888; font-size: 14px; margin-bottom: 18px; }
        .loading-bar-container { width: 220px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .loading-bar { width: 0; height: 100%; background: #39ff14; animation: loadBar 2s ease-in-out forwards; }
        @keyframes loadBar { 0% { width: 0; } 100% { width: 90%; } }

        /* ========== GAME UI ========== */
        #info-icon {
            position: fixed; top: 16px; left: 16px; z-index: 100; cursor: pointer;
            background: rgba(30,30,30,0.7); border-radius: 50%; padding: 6px;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #info-icon:hover { background: rgba(60,60,60,0.9); }

        #volume-icon {
            position: fixed; top: 56px; left: 16px; z-index: 100; cursor: pointer;
            background: rgba(30,30,30,0.7); border-radius: 50%; padding: 6px;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #volume-icon:hover { background: rgba(60,60,60,0.9); }

        #controls-info {
            display: none; position: fixed; top: 50px; left: 16px;
            background: rgba(30,30,30,0.95); border: 1px solid #444; border-radius: 10px;
            padding: 16px; z-index: 120; color: #eee; font-size: 13px; min-width: 220px;
        }

        #volume-popup {
            display: none; position: fixed; bottom: 70px; left: 20px;
            background: rgba(30,30,30,0.95); border: 1px solid #444; border-radius: 10px;
            padding: 16px 18px; z-index: 120; min-width: 210px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); color: #eee; font-size: 13px;
        }
        #volume-popup h4 { margin: 0 0 10px 0; font-size: 14px; color: #aaa; text-align: center; }
        .volume-slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .volume-slider-row label { width: 70px; font-size: 12px; color: #ccc; }
        .volume-slider-row input[type=range] { flex: 1; accent-color: #39ff14; }
        .volume-value { width: 28px; text-align: right; font-size: 12px; color: #aaa; }
        #volume-popup-close { position: absolute; top: 4px; right: 8px; background: none; border: none; color: #888; font-size: 16px; cursor: pointer; }

        /* Score indicator */
        #game-score {
            position: fixed; bottom: 16px; left: 16px; z-index: 100;
            background: rgba(30,30,30,0.8); border: 1px solid #333; border-radius: 8px;
            padding: 6px 14px; color: #39ff14; font-size: 14px; font-weight: 600;

        /* Secret dialog */
        #secret-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 10000;
            display: flex; align-items: flex-start; justify-content: flex-start;

        #secret-overlay input {
            background: #111; color: #39ff14; border: 1px solid #333;

            outline: none; font-family: monospace; width: 180px;
        }
        #secret-overlay input::placeholder { color: #555; }

        /* Crosshair */
        #game-crosshair {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 500; pointer-events: none;
        }
    </style>
</head>

<script>
/**
 * ============================================
 * ROOM CONFIGURATION
 * ============================================
 * Chaque pièce doit avoir un nom unique pour l'isolation des données.
 */
// Lire les paramètres URL (?room=nom&title=Titre)
const urlParams = new URLSearchParams(window.location.search);
const ROOM_CONFIG = {
    name: urlParams.get('room') || 'room_model',
    title: urlParams.get('title') || 'Nouvelle Pièce'
};

/**
 * VARIABLES DE LA SCENE
 */
let scene, camera, renderer, controls;
let groundMesh;

// Variables bridge pour compatibilité éditeur (déclarées ici, peuplées par l'éditeur si chargé)
let walls = [];
let characterCollisionProxies = [];
let savedNabyTransform = null;
let nabyRawHeight = null;
let babyModel = null;
let _cinematicPlaying = false;
let _currentCinematicZone = null;
let mixer;
let isMoving = false;
let collisionCacheCounter = 0;
let isPanelCollapsed = false;

// Stubs pour fonctions attendues par l'éditeur
function getMasterVolume(category) {
    const el = document.getElementById(
        category === 'musique' ? 'vol-musique' :
        category === 'ambiance' ? 'vol-dialogues' : 'vol-bruitages'
    );
    return el ? parseInt(el.value) / 100 : 1.0;
}
function updateGameVolume() {
    document.getElementById('vol-dialogues-val').textContent = document.getElementById('vol-dialogues').value;
    document.getElementById('vol-musique-val').textContent = document.getElementById('vol-musique').value;
    document.getElementById('vol-bruitages-val').textContent = document.getElementById('vol-bruitages').value;
}
function createCharacterCollisionProxy() {}
function removeCharacterCollisionProxy() {}
function updateCharacterCollisionProxy() {}
function loadPermanentObjects() {}

// Enregistrer cette pièce dans la liste des pièces (pour le dialogue "Nouvelle pièce")
(function() {
    try {
        var rooms = JSON.parse(localStorage.getItem('resistance_rooms_list') || '[]');
        if (!rooms.find(function(r) { return r.name === ROOM_CONFIG.name; })) {
            rooms.push({ name: ROOM_CONFIG.name, title: ROOM_CONFIG.title, createdAt: new Date().toISOString() });
            localStorage.setItem('resistance_rooms_list', JSON.stringify(rooms));
        }
    } catch(e) {}
})();

// Navigation
const keysPressed = {};
const ROOM_LIMIT = 98;
const baseEyeHeight = 1.60;

/**
 * INITIALISATION DE LA SCENE 3D
 */
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, baseEyeHeight, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = false;
    controls.minDistance = 0.5;
    controls.maxDistance = 150;
    controls.maxPolarAngle = Math.PI / 2.1;
    controls.mouseButtons = {
        LEFT: null,
        MIDDLE: THREE.MOUSE.DOLLY,
        RIGHT: THREE.MOUSE.ROTATE
    };

    // Sol
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    groundMesh = new THREE.Mesh(floorGeo, floorMat);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    groundMesh.name = 'ground';
    scene.add(groundMesh);

    // Lumière ambiante
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    // Lumière directionnelle
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    animate();

    // Event listeners
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('keydown', (e) => { keysPressed[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    // Masquer l'écran de chargement
    setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
            const bar = document.getElementById('loading-bar');
            if (bar) { bar.style.animation = 'none'; bar.style.width = '100%'; }
            setTimeout(() => {
                loadingScreen.classList.add('fade-out');
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 600);
            }, 400);
        }
    }, 2000);
}

/**
 * MOUVEMENT CLAVIER (ZQSD)
 */
function handleMovement() {
    const moveSpeed = 0.08;
    const direction = new THREE.Vector3();
    const side = new THREE.Vector3();

    camera.getWorldDirection(direction);
    direction.y = 0;
    direction.normalize();
    side.crossVectors(direction, camera.up).normalize();

    let moveX = 0, moveZ = 0;
    if (keysPressed['z'] || keysPressed['w']) { moveX += direction.x * moveSpeed; moveZ += direction.z * moveSpeed; }
    if (keysPressed['s']) { moveX -= direction.x * moveSpeed; moveZ -= direction.z * moveSpeed; }
    if (keysPressed['q'] || keysPressed['a']) { moveX -= side.x * moveSpeed; moveZ -= side.z * moveSpeed; }
    if (keysPressed['d']) { moveX += side.x * moveSpeed; moveZ += side.z * moveSpeed; }

    const nextX = camera.position.x + moveX;
    const nextZ = camera.position.z + moveZ;
    if (Math.abs(nextX) < ROOM_LIMIT) { camera.position.x = nextX; controls.target.x += moveX; }
    if (Math.abs(nextZ) < ROOM_LIMIT) { camera.position.z = nextZ; controls.target.z += moveZ; }
}

/**
 * BOUCLE D'ANIMATION
 */
function animate() {
    requestAnimationFrame(animate);
    handleMovement();
    controls.update();
    renderer.render(scene, camera);
}

/**
 * UI - Icônes info et volume
 */
document.getElementById('info-icon').addEventListener('click', function() {
    const info = document.getElementById('controls-info');
    info.style.display = info.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('volume-icon').addEventListener('click', function() {
    const popup = document.getElementById('volume-popup');
    popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
});

/**
 * ============================================
 * SECRET EDITOR LOADING (Ctrl+Shift+C)
 * ============================================
 */
let editorLoaded = false;
let secretDialogOpen = false;

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.code === 'KeyC') {
        e.preventDefault();
        if (!secretDialogOpen && !editorLoaded) openSecretDialog();
    }
});

function openSecretDialog() {
    secretDialogOpen = true;
    const overlay = document.createElement('div');
    overlay.id = 'secret-overlay';
    overlay.innerHTML = '<input type="password" id="secret-input" placeholder="Code..." autofocus>';
    document.body.appendChild(overlay);

    const input = document.getElementById('secret-input');
    input.focus();

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (input.value.toLowerCase() === 'editor') {
                overlay.remove();
                secretDialogOpen = false;
                loadEditor();
            } else {
                overlay.remove();
                secretDialogOpen = false;
            }
        }
        if (e.key === 'Escape') {
            overlay.remove();
            secretDialogOpen = false;
        }
    });

    // Fermer si clic en dehors de l'input
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
            overlay.remove();
            secretDialogOpen = false;
        }
    });
}

function loadScript(src) {
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => {
            console.warn('Failed to load:', src);
            reject(new Error('Script load failed: ' + src));
        };
        document.body.appendChild(script);
    });
}

async function loadEditor() {
    if (editorLoaded) return;
    console.log('Chargement de l\'éditeur...');

    // 1. CSS éditeur
    const cssLink = document.createElement('link');
    cssLink.rel = 'stylesheet';
    cssLink.href = 'editor/editor.css';
    document.head.appendChild(cssLink);

    // 2. editor-state.js (variables globales éditeur)
    await loadScript('editor/editor-state.js');
    currentRoomName = ROOM_CONFIG.name;

    // 3. Panneau HTML de l'éditeur
    try {
        const resp = await fetch('editor/editor-panel.html');
        if (resp.ok) {
            document.getElementById('editor-container').innerHTML = await resp.text();
        }
    } catch (e) {
        console.warn('Chargement editor-panel.html échoué:', e);
    }

    // 4. Ajouter les éléments UI de l'éditeur (toggle, mode switch, etc.)
    addEditorUIElements();

    // 5. Scripts éditeur (ordre important)
    const editorScripts = [
        'editor/editor-utils.js',
        'editor/editor-core.js',
        'editor/editor-objects.js',
        'editor/editor-camera-lights.js',
        'editor/editor-audio.js',
        'editor/editor-save.js',
        'editor/editor-floorplan.js'
    ];
    for (const src of editorScripts) {
        await loadScript(src);
    }

    // 6. Initialiser l'éditeur
    initEditor();
    if (typeof initEditorObjectsListeners === 'function') initEditorObjectsListeners();
    initAccordions();
    await bootstrapFromFiles();
    await loadProjectOnStartup();

    editorLoaded = true;
    console.log('Éditeur chargé avec succès');
}

function addEditorUIElements() {
    // Bouton toggle éditeur
    if (!document.getElementById('toggle-editor-btn')) {
        const btn = document.createElement('button');
        btn.id = 'toggle-editor-btn';
        btn.title = 'Mode Éditeur';
        btn.style.cssText = 'position:fixed; top:16px; right:16px; z-index:100; background:rgba(30,30,30,0.7); border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center;';
        btn.innerHTML = '<img src="icones/wrench.svg" alt="Éditeur" width="20" height="20" style="filter: brightness(0) invert(1);">';
        document.body.appendChild(btn);
    }

    // Bouton plier/déplier panneau
    if (!document.getElementById('toggle-panel-collapse')) {
        const btn = document.createElement('button');
        btn.id = 'toggle-panel-collapse';
        btn.title = 'Plier/Déplier le panneau';
        btn.innerHTML = '<img src="icones/circle-chevron-right.svg" alt="Déplier" width="24" height="24" style="filter: brightness(0) invert(1);">';
        document.body.appendChild(btn);
        btn.addEventListener('click', function() {
            const panel = document.getElementById('editor-panel');
            const btnEl = document.getElementById('toggle-panel-collapse');
            isPanelCollapsed = !isPanelCollapsed;
            const btnImg = btnEl.querySelector('img');
            if (isPanelCollapsed) {
                panel.classList.add('collapsed');
                btnEl.classList.add('collapsed');
                btnImg.src = 'icones/circle-chevron-left.svg';
            } else {
                panel.classList.remove('collapsed');
                btnEl.classList.remove('collapsed');
                btnImg.src = 'icones/circle-chevron-right.svg';
            }
        });
    }

    // Switch Mode Jeu/Développeur
    if (!document.getElementById('floating-mode-switch')) {
        const sw = document.createElement('button');
        sw.id = 'floating-mode-switch';
        sw.title = 'Mode Jeu / Développeur';
        sw.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#2a2a2a; border:1px solid #3a3a3a; border-radius:20px; width:40px; height:80px; padding:4px; cursor:pointer; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:all 0.3s;';
        sw.innerHTML = `
            <div id="floating-switch-indicator" style="position:absolute; top:4px; width:32px; height:36px; background:#ff6b35; border-radius:16px; transition:all 0.3s; display:flex; align-items:center; justify-content:center;">
                <img src="icones/gamepad-2.svg" width="20" height="20" style="filter: brightness(0) invert(1);">
            </div>
            <div style="width:32px; height:36px; display:flex; align-items:center; justify-content:center; z-index:1;"></div>
            <div style="width:32px; height:36px; display:flex; align-items:center; justify-content:center; z-index:1;">
                <img src="icones/code-xml.svg" width="20" height="20" style="filter: brightness(0) invert(1);">
            </div>`;
        document.body.appendChild(sw);
    }

    // Étiquette dimensions (masquée, pour l'éditeur)
    if (!document.getElementById('object-dimensions-label')) {
        const label = document.createElement('div');
        label.id = 'object-dimensions-label';
        label.style.display = 'none';
        label.innerHTML = '<div class="dim-title" id="dim-label-name">Objet</div><div class="dim-row"><span>L: <span class="dim-val" id="dim-label-w">-</span><span class="dim-unit"> cm</span></span><span>l: <span class="dim-val" id="dim-label-d">-</span><span class="dim-unit"> cm</span></span><span>H: <span class="dim-val" id="dim-label-h">-</span><span class="dim-unit"> cm</span></span></div>';
        document.body.appendChild(label);
    }
}

window.onload = function() {
    init();
    ScoreManager.init(ROOM_CONFIG.name);
};
</script>

</body>
</html>
